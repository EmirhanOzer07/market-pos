spring.application.name=pos
server.port=8080

# Hızlı başlangıç — bean'ler sadece ihtiyaç duyulduğunda başlatılır
spring.main.lazy-initialization=true

# SSL KAPALI ? lokal masaustu uygulamasi icin gerekmiyor
# server.ssl.enabled=true
# server.ssl.key-store=classpath:pos-ssl.p12
# server.ssl.key-store-type=PKCS12
# server.ssl.key-alias=pos
# server.ssl.key-store-password=${SSL_KEYSTORE_PASSWORD}

# H2 Veritabanı — bağlantı DataSourceConfig.java tarafından AES şifreli olarak yapılandırılır
# spring.datasource.* burada tanımlanmıyor — DataSourceConfig @Bean override ediyor

# Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jackson.serialization.write-dates-as-timestamps=false
# ✅ false: MarketFilterAspect @Transactional ile tüm lazy loading transaction içinde yönetiliyor
spring.jpa.open-in-view=false


# Cache — urun listesi 30 saniye cache'de tutulur
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=100,expireAfterWrite=30s

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# Excel Yedek — boş bırakılırsa AppData/Local/MarketPOS/yedek/excel kullanılır
# Google Drive'ı bu klasöre yönlendirin
backup.excel.path=

# Flyway — migrasyon yönetimi
# Mevcut müşteri DB'leri için baseline: şema zaten oluşturulmuş, V1 çalıştırılmaz
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration

# SuperAdmin
# Patron sifresi AppData/Local/MarketPOS/patron.hash dosyasinda saklanir
# Bu dosya git'e girmez, application.properties'de hash tutulmaz (CWE-798)