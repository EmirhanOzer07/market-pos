# ── Test ortamı — üretim DB ve dosya sistemiyle izole ──────────────────────
# DataSourceConfig @Profile("!test") ile devre dışı; TestDataSourceConfig sağlar.

# JPA — şifresiz H2 in-memory, her context'te temiz schema
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Flyway devre dışı — Hibernate create-drop yeterli, migrasyon testleri dışında gerekmez
spring.flyway.enabled=false

# JWT — sabit test secret (üretimde UUID, burada deterministik)
jwt.secret=test-jwt-secret-key-for-testing-purposes-only-min-32-chars
jwt.expiration=3600000

# Cache devre dışı — testler arası stale veri riskini sıfırlar
spring.cache.type=none

# Jackson
spring.jackson.serialization.write-dates-as-timestamps=false

# Lazy init kapalı — test context hızlı başlar, eksik bean erken tespit edilir
spring.main.lazy-initialization=false
spring.main.banner-mode=off
# TestDataSourceConfig'teki @Primary CacheManager'ın AppConfig'tekini ezmesine izin ver
spring.main.allow-bean-definition-overriding=true
